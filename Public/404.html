<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wecraft | 404 Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d90f0f;
            --primary-hover: #b30c0c;
            --neutral-bg: #fafafa;
            --surface: #ffffff;
            --border: #eaeaea;
            --text-main: #111111;
            --text-muted: #777777;
            --radius-lg: 14px;
            --radius-md: 8px;
            --shadow-sm: 0 2px 10px rgb(17 17 17 / 0.04);
            --transition: all 150ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--neutral-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            background: var(--surface);
            max-width: 480px;
            width: 100%;
            padding: 48px 32px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .error-code {
            font-size: 82px;
            font-weight: 800;
            letter-spacing: -4px;
            line-height: 1;
            color: var(--primary);
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .brand-logo {
            max-width: 120px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
                box-shadow: none;
                border: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="img/Wecraft Final Logos.png" alt="wecraft" class="brand-logo">
        <div class="error-code">404</div>
        <h1>Lost in the Workshop?</h1>
        <p>The page you're looking for doesn't exist. It might have been moved or the materials for it are still being prepared.</p>
        <a href="index.html" class="btn">Back to Dashboard</a>
    </div>
</body>
</html>
