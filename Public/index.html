<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wecraft | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <!-- Main App Container -->
    <div id="app-container" class="visible">
        <div id="sidebar-overlay"></div>
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <img src="img/Wecraft Final Logos.png" alt="wecraft" class="brand-logo">
                <button id="close-sidebar-mobile" class="btn-icon" aria-label="Close sidebar" style="display: none; margin-left: auto;">
                    <span id="icon-close"></span>
                </button>
            </div>
            <ul class="nav-links">
                <li class="nav-item">
                    <a class="nav-link active" data-view="dashboard">
                        <span class="icon" id="icon-dashboard"></span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="orders">
                        <span class="icon" id="icon-orders"></span>
                        <span>Orders</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="inventory">
                        <span class="icon" id="icon-inventory"></span>
                        <span>Inventory</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="clients">
                        <span class="icon" id="icon-clients"></span>
                        <span>Clients</span>
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
            </div>
        </aside>

        <!-- Main Content Area -->
        <main>
            <header>
                <div class="top-left">
                    <button id="toggle-sidebar" class="btn-icon" aria-label="Toggle sidebar navigation">
                        <span id="icon-menu"></span>
                    </button>
                    <h2 id="view-title">Dashboard</h2>
                </div>
                <div class="top-right">
                    <div class="header-search">
                        <input type="text" placeholder="Search anything" aria-label="Search orders, clients, and inventory">
                        <span id="icon-search"></span>
                    </div>
                    <button id="theme-toggle" class="btn-icon" aria-label="Toggle dark mode">
                        <span id="icon-theme"></span>
                    </button>
                </div>
            </header>

            <div class="content-area" id="main-content">
                <!-- dynamic content will be injected here -->
            </div>
        </main>
    </div>

    <!-- Mobile Tab Bar -->
    <nav class="tab-bar">
        <div class="tab-item active" data-view="dashboard">
            <i class="ti ti-home"></i>
            <span>Home</span>
        </div>
        <div class="tab-item" data-view="orders">
            <i class="ti ti-clipboard-list"></i>
            <span>Orders</span>
        </div>
        <div class="tab-item" data-view="tasks">
            <i class="ti ti-package"></i>
            <span>Stock</span>
        </div>
        <div class="tab-item" data-view="clients">
            <i class="ti ti-users"></i>
            <span>Clients</span>
        </div>
    </nav>

    <!-- Modals -->
    <div id="e-modal-overlay" class="e-modal-overlay">
        <div class="e-shell">
            <div class="e-core" id="e-modal-content">
                <!-- Premium content injected here -->
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-header-title">
                    <h3 id="modal-title">Modal Title</h3>
                </div>
                <div class="modal-header-actions" id="modal-header-actions">
                    <!-- Action buttons injected here -->
                </div>
                <button class="btn-icon" id="close-modal" aria-label="Close dialog">
                    <span id="icon-close"></span>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content injected here -->
            </div>
            <div class="modal-footer" id="modal-footer">
                <!-- Modal buttons injected here -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>



    <audio id="welcome-audio" src="assets/%D8%A7%D9%84%D8%A7%20%D9%8A%D8%A8%D8%A7%D8%B1%D9%83%20%D9%81%D8%B9%D9%85%D8%B1%20%D8%B3%D9%8A%D8%AF%D9%8A.mp3" preload="auto"></audio>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Audio logic could go here if needed later
    </script>
</body>
</html>
