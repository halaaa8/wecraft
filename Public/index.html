<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wecraft | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main App Container -->
    <div id="app-container" class="visible">
        <div id="sidebar-overlay"></div>
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header" style="justify-content: flex-start; padding: 0 24px 24px;">
                <img src="img/Wecraft Final Logos.png" alt="wecraft" style="width: 140px; height: 60px; object-fit: contain;">
            </div>
            <ul class="nav-links">
                <li class="nav-item">
                    <a class="nav-link active" data-view="dashboard">
                        <span class="icon" id="icon-dashboard"></span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="orders">
                        <span class="icon" id="icon-orders"></span>
                        <span>Orders</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="tasks">
                        <span class="icon" id="icon-tasks"></span>
                        <span>Inventory</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="clients">
                        <span class="icon" id="icon-clients"></span>
                        <span>Clients</span>
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
            </div>
        </aside>

        <!-- Main Content Area -->
        <main>
            <header>
                <div class="top-left">
                    <button id="toggle-sidebar" class="btn-icon">
                        <span id="icon-menu"></span>
                    </button>
                    <h2 id="view-title" style="font-size: 18px; font-weight: 700;">Dashboard</h2>
                </div>
                <div class="top-right">
                    <div id="user-profile" style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 13px; font-weight: 600; color: #6b7280;">Admin Account</span>
                        <div style="width: 32px; height: 32px; border-radius: 50%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;">AD</div>
                    </div>
                </div>
            </header>

            <div class="content-area" id="main-content">
                <!-- dynamic content will be injected here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button class="btn-icon" id="close-modal">
                    <span id="icon-close"></span>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content injected here -->
            </div>
            <div class="modal-footer" id="modal-footer">
                <!-- Modal buttons injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
