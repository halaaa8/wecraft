<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wecraft | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <!-- Main App Container -->
    <div id="app-container" class="visible">
        <div id="sidebar-overlay"></div>
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <img src="img/Wecraft Final Logos.png" alt="wecraft" class="brand-logo">
            </div>
            <ul class="nav-links">
                <li class="nav-item">
                    <a class="nav-link active" data-view="dashboard">
                        <span class="icon" id="icon-dashboard"></span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="orders">
                        <span class="icon" id="icon-orders"></span>
                        <span>Orders</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="tasks">
                        <span class="icon" id="icon-tasks"></span>
                        <span>Inventory</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-view="clients">
                        <span class="icon" id="icon-clients"></span>
                        <span>Clients</span>
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
            </div>
        </aside>

        <!-- Main Content Area -->
        <main>
            <header>
                <div class="top-left">
                    <button id="toggle-sidebar" class="btn-icon">
                        <span id="icon-menu"></span>
                    </button>
                    <h2 id="view-title" style="font-size: 18px; font-weight: 700;">Dashboard</h2>
                </div>
                <div class="top-center">
                    <div class="header-search">
                        <input type="text" placeholder="Search anything">
                        <span id="icon-search"></span>
                    </div>
                </div>
                <div class="top-right">
                    <button class="btn-icon header-alert" aria-label="Notifications">
                        <span class="alert-dot"></span>
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 01-3.46 0"></path>
                        </svg>
                    </button>
                    <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">
                        <span id="icon-theme"></span>
                    </button>
                </div>
            </header>

            <div class="content-area" id="main-content">
                <!-- dynamic content will be injected here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-header-title">
                    <h3 id="modal-title">Modal Title</h3>
                </div>
                <div class="modal-header-actions" id="modal-header-actions">
                    <!-- Action buttons injected here -->
                </div>
                <button class="btn-icon" id="close-modal">
                    <span id="icon-close"></span>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content injected here -->
            </div>
            <div class="modal-footer" id="modal-footer">
                <!-- Modal buttons injected here -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>



    <audio id="welcome-audio" src="assets/%D8%A7%D9%84%D8%A7%20%D9%8A%D8%A8%D8%A7%D8%B1%D9%83%20%D9%81%D8%B9%D9%85%D8%B1%20%D8%B3%D9%8A%D8%AF%D9%8A.mp3" preload="auto"></audio>
    <audio id="order-notification" src="assets/WhatsApp%20Audio%202026-05-08%20at%2019.00.08.mp3" preload="auto"></audio>

    <script src="script.js"></script>
    <script>
        // Audio logic could go here if needed later
    </script>
</body>
</html>
